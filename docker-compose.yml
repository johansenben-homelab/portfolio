services: 
  portfolio:
    build:
      context: ./
    environment:
    restart: unless-stopped
    networks:
      - sites
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio.rule=Host(`portfolio-ben.pljohansenfam.work`)
      - traefik.http.routers.portfolio.entrypoints=web
      - traefik.http.services.portfolio.loadbalancer.server.port=3000
      - traefik.docker.network=sites
networks:
  sites:
    external: true

